# TS6 Manager — Kubernetes-flavoured manifest for `podman kube play`.
#
# Brings up the manager stack rootless on a clean Podman >= 4.4 host.
# `podman kube play` takes a single kube file (multi-file args need
# Podman 5.0+), so concat the Secret + Pod manifest first:
#
#   cat deploy/kube/secrets.example.yaml deploy/kube/ts6-manager.yaml \
#     > /tmp/ts6-manager.kube.yaml
#   podman kube play /tmp/ts6-manager.kube.yaml
#   podman kube down deploy/kube/ts6-manager.yaml
#
# See deploy/kube/README.md for env setup, image overrides, and the
# local-build smoke path. Topology mirrors podman-compose.yml + the
# Quadlet pod in deploy/quadlet/ (impl-plan §9). Volumes are PVCs so
# named-volume ownership crosses the rootless userns cleanly
# (PURA-67).
---
# State root (/var/lib/ts6-manager). ts6-db / ts6-music mount on top as
# nested volumes; ts6-data additionally persists operator uploads the
# server writes under DATA_DIR — the yt-dlp cookie file (PURA-314).
# Without it those uploads sit on the ephemeral overlay and are wiped on
# every pod recreation while the upload-timestamp row in ts6-db survives.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ts6-data
  labels:
    app: ts6-manager
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ts6-db
  labels:
    app: ts6-manager
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ts6-music
  labels:
    app: ts6-manager
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: ts6-manager
  labels:
    app: ts6-manager
spec:
  restartPolicy: Always
  # Host networking is required, not a perf tweak. The manager's
  # WebQuery client reaches the TS6 fixture (and any operator-added
  # production TS6 server colocated on the same host) over the
  # rootless-podman host. Without hostNetwork the pod sits on the
  # default pod-bridge and egresses through passt — the same path
  # that wedges TS6 6.0.0-beta9 WebQuery after ~5 requests
  # (PURA-105, see docs/ts6-fixture.md "Why --network=host is
  # mandatory"). The dashboard tick worker fans out 4 reads every
  # 5 s, so a fresh fixture wedges within ~30 s of operator activity.
  # hostNetwork drops passt from the call path; manager-side surface
  # area is unchanged because the pod already advertises its
  # listeners as hostPort (3001/tcp, 7080/tcp, 4443/udp).
  hostNetwork: true
  securityContext:
    runAsNonRoot: true
    fsGroup: 10001
  containers:
    - name: fullstack
      image: ghcr.io/frozentear/ts6-manager-fullstack:v1.0
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
      ports:
        # Under `hostNetwork: true` the container shares the host's net
        # namespace, so `containerPort` IS the host port — `hostPort:`
        # would be both redundant and rejected by Podman with
        # "PortMappings can only be used with Bridge, slirp4netns, or
        # pasta networking".
        - name: http
          containerPort: 3001
          protocol: TCP
      env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: LOG_LEVEL
          value: "info"
        - name: LOG_PRETTY
          value: ""
        - name: FRONTEND_URL
          value: "http://localhost:3000"
        - name: DATABASE_URL
          value: "surrealkv:///var/lib/ts6-manager/db"
        - name: MUSIC_DIR
          value: "/var/lib/ts6-manager/music"
        # Where the server writes operator uploads not held in the
        # SurrealKV store (the yt-dlp cookie file, PURA-314). Pinned
        # explicitly — the server default is the cwd-relative `./data`.
        # Sits inside the ts6-data volume so the cookie survives pod
        # recreation.
        - name: DATA_DIR
          value: "/var/lib/ts6-manager/data"
        - name: SIDECAR_URL
          value: "http://127.0.0.1:7080"
      envFrom:
        - secretRef:
            name: ts6-manager-secrets
      volumeMounts:
        # State root — ts6-db / ts6-music nest on top of this. Listed
        # first; podman kube play orders mounts parent-before-child.
        - name: ts6-data
          mountPath: /var/lib/ts6-manager
        - name: ts6-db
          mountPath: /var/lib/ts6-manager/db
        - name: ts6-music
          mountPath: /var/lib/ts6-manager/music
      readinessProbe:
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 3
      livenessProbe:
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 30
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 3
    - name: sidecar
      image: ghcr.io/frozentear/ts6-manager-sidecar:v1.0
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsUser: 10002
        runAsGroup: 10002
      args:
        - "--listen"
        - "[::]:4443"
        - "--http-listen"
        - "0.0.0.0:7080"
        - "--tls-generate"
        - "localhost"
      ports:
        # Same constraint as the fullstack container above: under
        # `hostNetwork: true` the `containerPort` is reachable directly
        # on the host; `hostPort` is rejected.
        - name: control
          containerPort: 7080
          protocol: TCP
        - name: webtransport
          containerPort: 4443
          protocol: UDP
      readinessProbe:
        httpGet:
          path: /health
          port: control
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 3
      livenessProbe:
        httpGet:
          path: /health
          port: control
        initialDelaySeconds: 30
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 3
  volumes:
    - name: ts6-data
      persistentVolumeClaim:
        claimName: ts6-data
    - name: ts6-db
      persistentVolumeClaim:
        claimName: ts6-db
    - name: ts6-music
      persistentVolumeClaim:
        claimName: ts6-music
