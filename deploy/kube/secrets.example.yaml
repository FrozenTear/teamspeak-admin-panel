# Example secret bundle for ts6-manager. Copy to `secrets.yaml`, fill in
# real values, then concat with the main manifest and play:
#
#   cat deploy/kube/secrets.yaml deploy/kube/ts6-manager.yaml \
#     > /tmp/ts6-manager.kube.yaml
#   podman kube play /tmp/ts6-manager.kube.yaml
#
# Two-file `podman kube play <a> <b>` only works on Podman >= 5.0; the
# concat keeps Podman 4.4+ working.
#
# Never commit a populated `secrets.yaml`. The `.gitignore` excludes it.
---
apiVersion: v1
kind: Secret
metadata:
  name: ts6-manager-secrets
  labels:
    app: ts6-manager
type: Opaque
stringData:
  # 32+ byte random string. Generate with:
  #   openssl rand -base64 48
  JWT_SECRET: "change-me-jwt-secret-must-be-at-least-32-bytes-long"
  # 32-byte base64-encoded key for AES-256-GCM. Generate with:
  #   openssl rand -base64 32
  # Leave empty to disable at-rest encryption (not recommended for prod).
  ENCRYPTION_KEY: ""
