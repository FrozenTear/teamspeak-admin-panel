[workspace]
resolver = "3"
members = [
    "crates/shared",
    "crates/ts6-manager-server",
]

[workspace.package]
version = "0.0.1"
edition = "2024"
license = "MIT"
publish = false

[workspace.dependencies]
anyhow = "1.0"
axum = "0.8"
dioxus = { version = "0.7", features = ["fullstack"] }
dioxus-server = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "net"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
ts6-manager-shared = { path = "crates/shared" }

# Phase 1 SECURITY (PURA-4)
aes-gcm = "0.10"
argon2 = "0.5"
async-trait = "0.1"
bcrypt = "0.17"
hex = "0.4"
hickory-resolver = "0.24"
rand = "0.8"
scrypt = { version = "0.11", default-features = false, features = ["std"] }
thiserror = "2"
url = "2"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
