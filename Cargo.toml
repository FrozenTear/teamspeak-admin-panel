[workspace]
resolver = "3"
members = [
    "crates/shared",
    "crates/ts6-manager-server",
]

[workspace.package]
version = "0.0.1"
edition = "2024"
license = "MIT"
publish = false

[workspace.dependencies]
anyhow = "1.0"
axum = "0.8"
dioxus = { version = "0.7", features = ["fullstack", "router"] }
dioxus-server = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "net", "sync"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
ts6-manager-shared = { path = "crates/shared" }

# PURA-14 — auth client slice. `gloo-net` and `web-sys` are wasm-only; they
# are gated behind `cfg(target_arch = "wasm32")` in source, but the deps must
# resolve on every target so the workspace builds. `wasm-bindgen-futures`
# powers the gloo-net executor on the WASM target. `futures` is used on
# every target for the `BoxFuture` type the refresh-gate trait returns.
futures = { version = "0.3", default-features = false, features = ["std"] }
gloo-net = { version = "0.6", default-features = false, features = ["http", "json"] }
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "Storage",
    "Window",
    "Location",
] }

# Phase 1 SECURITY (PURA-4)
aes-gcm = "0.10"
argon2 = "0.5"
async-trait = "0.1"
bcrypt = "0.17"
hex = "0.4"
hickory-resolver = "0.24"
jsonwebtoken = "9"
rand = "0.8"
scrypt = { version = "0.11", default-features = false, features = ["std"] }
thiserror = "2"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "set-header"] }
url = "2"

# Phase 1 DATA (PURA-10) — SurrealDB v3 embedded (D8 ratified deviation 2026-05-07).
# `kv-surrealkv` is the production embedded backend; `kv-mem` powers unit tests
# without spinning up a server. The `protocol-*` features stay off so the binary
# does not pull in networking client code we are not yet using.
chrono = { version = "0.4", default-features = false, features = ["std", "clock", "serde"] }
surrealdb = { version = "3", default-features = false, features = ["kv-surrealkv", "kv-mem"] }

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
