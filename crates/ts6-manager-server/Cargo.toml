[package]
name = "ts6-manager-server"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[[bin]]
name = "ts6-manager-server"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
axum = { workspace = true }
dioxus = { workspace = true }
dioxus-server = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
ts6-manager-shared = { workspace = true }

# Phase 1 SECURITY (PURA-4)
aes-gcm = { workspace = true }
argon2 = { workspace = true }
async-trait = { workspace = true }
bcrypt = { workspace = true }
hex = { workspace = true }
hickory-resolver = { workspace = true }
jsonwebtoken = { workspace = true }
rand = { workspace = true }
scrypt = { workspace = true }
thiserror = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
url = { workspace = true }

# Phase 1 DATA (PURA-10)
chrono = { workspace = true }
surrealdb = { workspace = true }

# PURA-14 — auth client slice. WASM-only at runtime (gated by
# `cfg(target_arch = "wasm32")` in source); on native targets these crates
# compile but the request/storage code paths are unreachable.
futures = { workspace = true }
gloo-net = { workspace = true }
js-sys = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
web-sys = { workspace = true }

[dev-dependencies]
tower = { workspace = true, features = ["util"] }
http-body-util = "0.1"
