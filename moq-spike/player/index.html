<!doctype html>
<!--
  moq-spike WS-0 reference player. No build step, no framework.
  See ../README.md and ../../docs/adr/0007-moq-flavor-and-draft-pin.md.

  Heartbeat 1 of PURA-138 lands the page skeleton + control surface.
  Heartbeat 3 lands the WebTransport + WebCodecs subscribe/decode loop.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>moq-spike — WS-0 reference player</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0f12;
        --fg: #e6e8eb;
        --muted: #8a929c;
        --accent: #4ea1ff;
        --border: #1f242b;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
        font-size: 14px;
      }
      header {
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 16px;
        align-items: center;
      }
      header h1 {
        font-size: 14px;
        margin: 0;
        font-weight: 600;
      }
      header .muted { color: var(--muted); }
      main {
        padding: 20px;
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: auto auto 1fr;
      }
      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      input[type="text"] {
        flex: 1;
        padding: 6px 10px;
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
        font: inherit;
      }
      button {
        padding: 6px 14px;
        border: 1px solid var(--accent);
        background: transparent;
        color: var(--accent);
        border-radius: 4px;
        cursor: pointer;
        font: inherit;
      }
      button:hover:not(:disabled) { background: rgba(78, 161, 255, 0.1); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      .stage {
        position: relative;
        background: #000;
        border: 1px solid var(--border);
        border-radius: 4px;
        aspect-ratio: 16 / 9;
        max-width: 960px;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      .status {
        color: var(--muted);
        white-space: pre-wrap;
        word-break: break-all;
        font-size: 12px;
        line-height: 1.5;
        max-height: 220px;
        overflow-y: auto;
        background: #0a0c0f;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 10px 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>moq-spike</h1>
      <span class="muted">WS-0 reference player · no build</span>
    </header>
    <main>
      <form class="controls" id="connect-form">
        <input
          id="relay"
          type="text"
          placeholder="https://localhost:4443/anon"
          value="https://localhost:4443/anon"
        />
        <input
          id="namespace"
          type="text"
          placeholder="pura-spike/0"
          value="pura-spike/0"
        />
        <button id="subscribe" type="submit">subscribe</button>
        <button id="stop" type="button" disabled>stop</button>
      </form>
      <div class="stage">
        <canvas id="video" width="640" height="360"></canvas>
      </div>
      <pre class="status" id="log">ready.</pre>
    </main>
    <script type="module" src="./player.js"></script>
  </body>
</html>
