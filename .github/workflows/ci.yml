name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a new push arrives.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  # Toolchain matches rust-toolchain.toml. Keep in lock-step.
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  fmt-clippy:
    name: fmt + clippy (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: main
            path: .
          - workspace: sidecar
            path: crates/ts6-media-sidecar
    steps:
      - uses: actions/checkout@v5

      # Clippy compiles build scripts; main workspace's native -sys crates
      # need these to even reach the lint stage. Mirrored from build-test.
      - name: Install system dependencies (main only)
        if: matrix.workspace == 'main'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-dev \
            libopus-dev \
            pkg-config \
            cmake \
            build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.path }}
          shared-key: ${{ matrix.workspace }}

      - name: cargo fmt --check
        working-directory: ${{ matrix.path }}
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: ${{ matrix.path }}
        run: cargo clippy --workspace --all-targets -- -D warnings

  build-test:
    name: build + test (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: main
            path: .
          - workspace: sidecar
            path: crates/ts6-media-sidecar
    steps:
      - uses: actions/checkout@v5

      # Main workspace pulls glib-sys (via livekit → libwebrtc → glib) and
      # audiopus_sys; both link against system libraries on Linux. Sidecar
      # has no such native deps, so this step only runs for the main matrix
      # entry. Update this set rather than papering over a single missing
      # `.pc` file.
      - name: Install system dependencies (main only)
        if: matrix.workspace == 'main'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-dev \
            libopus-dev \
            pkg-config \
            cmake \
            build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.path }}
          shared-key: ${{ matrix.workspace }}

      - name: cargo build
        working-directory: ${{ matrix.path }}
        run: cargo build --workspace --all-targets --locked

      - name: cargo test
        working-directory: ${{ matrix.path }}
        # ffmpeg-smoke and other heavy integration features stay gated.
        # Default features cover unit + non-network integration tests.
        run: cargo test --workspace --locked

  # PURA-170 (OD3 ratified on PURA-169): boot the public
  # `teamspeaksystems/teamspeak6-server` image and run the env-gated
  # WebQuery integration test
  # (`webquery::tests::integration_against_local_ts6_host_when_env_configured`)
  # against it. This is the Chapter 1 V2/V3 read-path smoke against a real
  # TS6 host, running automatically on every push/PR. Local invocation:
  # `make ts6-up` (see docs/ts6-fixture.md §"CI service container").
  ts6-fixture-smoke:
    name: TS6 fixture integration smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Tracks the `ts6-fixture` profile in `podman-compose.yml`. Pin to a
      # tagged digest here without touching local dev if chasing a regression.
      TS6_FIXTURE_IMAGE: docker.io/teamspeaksystems/teamspeak6-server:latest
    steps:
      - uses: actions/checkout@v5

      - name: Pull TS6 fixture image
        run: docker pull "$TS6_FIXTURE_IMAGE"

      # PURA-177: `TSSERVER_QUERY_HTTP_ENABLED=1` (and the SSH twin) are
      # required — `tsserver --help` shows both flags default to `0`, so the
      # PURA-170 env block only got ServerQuery's telnet path running and
      # `/version` on :10080 never bound. Image exposes only 9987/udp,
      # 10022/tcp, 30033/tcp by default; WebQuery (10080/tcp) is opt-in.
      - name: Boot TS6 fixture (host networking)
        run: |
          docker run -d --name ts6-fixture --network=host \
            -e TSSERVER_LICENSE_ACCEPTED=accept \
            -e TSSERVER_QUERY_ADMIN_PASSWORD=qa-admin \
            -e TSSERVER_QUERY_SKIP_BRUTE_FORCE_CHECK=1 \
            -e TSSERVER_QUERY_HTTP_ENABLED=1 \
            -e TSSERVER_QUERY_SSH_ENABLED=1 \
            "$TS6_FIXTURE_IMAGE"

      - name: Wait for fixture & capture API key
        run: |
          set -euo pipefail
          API_KEY=""
          for _ in $(seq 1 90); do
            if docker logs ts6-fixture 2>&1 | grep -qE 'apikey='; then
              API_KEY=$(docker logs ts6-fixture 2>&1 \
                | grep -oE 'apikey=[ ]*"?[A-Za-z0-9_-]+' | head -1 \
                | sed 's/apikey=[ ]*"*//')
              break
            fi
            sleep 2
          done
          if [ -z "$API_KEY" ]; then
            echo "FAIL: fixture did not print an apikey within 180s" >&2
            docker logs ts6-fixture
            exit 1
          fi
          last_code=""
          for i in $(seq 1 30); do
            last_code=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "x-api-key: $API_KEY" "http://127.0.0.1:10080/version" || true)
            if [ "$last_code" = "200" ]; then
              echo "Fixture WebQuery reachable on :10080"
              break
            fi
            sleep 2
            if [ "$i" = "30" ]; then
              echo "FAIL: WebQuery /version did not return 200 within 60s (last_code=$last_code)" >&2
              docker logs ts6-fixture
              exit 1
            fi
          done
          echo "::add-mask::$API_KEY"
          {
            echo "TS6_INTEGRATION_HOST=127.0.0.1"
            echo "TS6_INTEGRATION_PORT=10080"
            echo "TS6_INTEGRATION_API_KEY=$API_KEY"
          } >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ts6-fixture-smoke

      - name: Run TS6 WebQuery integration test
        run: |
          cargo test -p ts6-manager-server --locked \
            -- integration_against_local_ts6_host_when_env_configured --nocapture

      - name: Dump fixture logs on failure
        if: failure()
        run: docker logs ts6-fixture || true

      - name: Tear down fixture
        if: always()
        run: docker rm -f ts6-fixture || true

  fuzz-short:
    name: fuzz suite (short)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect fuzz crates
        id: detect
        run: |
          set -euo pipefail
          mapfile -t fuzz_dirs < <(find . -type f -name 'Cargo.toml' -path '*/fuzz/Cargo.toml' -not -path '*/target/*' -not -path '*/node_modules/*' 2>/dev/null || true)
          if [ "${#fuzz_dirs[@]}" -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No fuzz crates discovered (looking for **/fuzz/Cargo.toml). Skipping fuzz-short job."
            echo "When fuzz targets are added (planned under WS-Security R7 — TS ServerQuery escaping fuzz), this job will pick them up automatically."
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${fuzz_dirs[@]}" | tee fuzz-dirs.txt
          fi

      - name: Install Rust toolchain
        if: steps.detect.outputs.found == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        if: steps.detect.outputs.found == 'true'
        with:
          shared-key: fuzz

      - name: Install cargo-fuzz
        if: steps.detect.outputs.found == 'true'
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz targets (60s each)
        if: steps.detect.outputs.found == 'true'
        run: |
          set -euo pipefail
          while IFS= read -r manifest; do
            crate_dir="$(dirname "$manifest")"
            parent="$(dirname "$crate_dir")"
            echo "::group::Fuzz targets in $parent"
            (cd "$parent" && cargo fuzz list | while read -r target; do
              echo "Running fuzz target: $target (60s)"
              cargo fuzz run "$target" -- -max_total_time=60
            done)
            echo "::endgroup::"
          done < fuzz-dirs.txt
