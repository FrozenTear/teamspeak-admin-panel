<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TS6 Manager — Login (error state)</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="components.css">
<style>
  .login-shell { display: grid; grid-template-columns: minmax(360px, 40%) 1fr; min-height: 100vh; }
  .brand-pane {
    position: relative;
    padding: var(--space-9) var(--space-8);
    overflow: hidden;
    background: var(--bg-canvas);
    display: flex; flex-direction: column; gap: var(--space-7);
  }
  .brand-pane::before {
    content: ""; position: absolute; inset: -10% -30% auto auto;
    width: 600px; height: 600px;
    background: radial-gradient(circle at 30% 30%, rgba(60, 190, 239, 0.10), transparent 60%);
    pointer-events: none;
  }
  .brand-pane .wordmark { display: flex; align-items: center; gap: var(--space-4); font: var(--weight-bold) var(--text-lg) / 1 var(--font-sans); }
  .brand-pane .wordmark .mark { width: 18px; height: 18px; background: var(--accent-fg); border-radius: var(--radius-full); box-shadow: 0 0 16px rgba(60, 190, 239, 0.7); }
  .brand-pane .tagline { font: var(--weight-regular) var(--text-2xl) / var(--lh-2xl) var(--font-sans); color: var(--text-primary); max-width: 18ch; }
  .brand-pane ul { list-style: none; padding: 0; margin: 0; display: grid; gap: var(--space-4); color: var(--text-secondary); font: var(--weight-regular) var(--text-base) / var(--lh-md) var(--font-sans); }
  .brand-pane ul li::before { content: "•"; color: var(--accent-fg); margin-right: var(--space-4); }
  .form-pane { background: var(--bg-surface); display: grid; place-items: center; padding: var(--space-8); }
  .form { width: 100%; max-width: 380px; display: grid; gap: var(--space-6); }
  .form h1 { margin: 0; font: var(--weight-semibold) var(--text-2xl) / var(--lh-2xl) var(--font-sans); }
  .form .row { display: flex; align-items: center; gap: var(--space-3); font: var(--weight-regular) var(--text-sm) / var(--lh-sm) var(--font-sans); color: var(--text-secondary); }
</style>
</head>
<body>
<div class="login-shell">
  <div class="brand-pane">
    <div class="wordmark"><span class="mark"></span> TS6 Manager</div>
    <div class="tagline">Operate your TeamSpeak 6 community servers from one panel.</div>
    <ul>
      <li>Channels, clients, permissions</li>
      <li>Bot-flow automation</li>
      <li>Public server widgets</li>
      <li>Music &amp; video bots</li>
    </ul>
  </div>

  <div class="form-pane">
    <form class="form" novalidate>
      <h1>Sign in</h1>

      <div class="banner" role="alert">
        <span style="font-size:18px;line-height:1">⚠</span>
        <div class="body"><span class="title">Invalid credentials.</span> Check your username and password and try again.</div>
      </div>

      <div class="field">
        <label class="field-label" for="u">Username</label>
        <input id="u" class="input" type="text" autocomplete="username" value="robert">
      </div>

      <div class="field">
        <label class="field-label" for="p">Password</label>
        <div class="input-group">
          <input id="p" class="input" type="password" autocomplete="current-password" value="">
          <button type="button" class="affix" aria-label="Show password">⊘</button>
        </div>
      </div>

      <label class="row"><input type="checkbox"> Stay signed in</label>

      <button type="submit" class="btn btn-primary btn-lg btn-block">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
