<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TS6 Manager — Setup Wizard (Step 1)</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="components.css">
<style>
  body { min-height: 100vh; display: grid; place-items: center; padding: var(--space-7); background: var(--bg-canvas); }
  .shell { width: 100%; max-width: 600px; display: grid; gap: var(--space-3); }
  .head {
    display: flex; align-items: center; gap: var(--space-4);
    justify-content: center;
    font: var(--weight-bold) var(--text-md) / 1 var(--font-sans);
  }
  .head .mark { width: 18px; height: 18px; background: var(--accent-fg); border-radius: var(--radius-full); box-shadow: 0 0 16px rgba(60, 190, 239, 0.7); }
  .head .meta { color: var(--text-secondary); font-weight: var(--weight-regular); font-size: var(--text-base); }
  .card h2 {
    margin: 0 0 var(--space-3);
    font: var(--weight-semibold) var(--text-xl) / var(--lh-xl) var(--font-sans);
  }
  .card .desc {
    margin: 0 0 var(--space-7);
    color: var(--text-secondary);
    font-size: var(--text-base);
    line-height: var(--lh-md);
  }
  .field-stack { display: grid; gap: var(--space-6); margin-bottom: var(--space-7); }
  .rules { display: grid; gap: var(--space-3); margin-top: var(--space-5); padding-top: var(--space-5); border-top: 1px dashed var(--border-subtle); }
  .rule { display: flex; align-items: center; gap: var(--space-3); font: var(--weight-regular) var(--text-sm) / var(--lh-sm) var(--font-sans); color: var(--text-muted); }
  .rule.is-met { color: var(--success-fg); }
  .rule .mark { width: 16px; height: 16px; border-radius: var(--radius-full); display: inline-grid; place-items: center; background: var(--bg-surface-sunken); font-size: 11px; }
  .rule.is-met .mark { background: rgba(46, 184, 114, 0.15); color: var(--success-fg); }
  .actions { display: flex; justify-content: flex-end; gap: var(--space-4); padding-top: var(--space-5); border-top: 1px solid var(--border-subtle); }
  .actions .left { margin-right: auto; }
</style>
</head>
<body>
<div class="shell">
  <div class="head">
    <span class="mark"></span> TS6 Manager
    <span class="meta">— first-time setup</span>
  </div>

  <div class="steps">
    <span class="step is-active"><span class="dot">1</span> Admin</span>
    <span class="connector"></span>
    <span class="step"><span class="dot">2</span> Server</span>
    <span class="connector"></span>
    <span class="step"><span class="dot">3</span> Done</span>
  </div>

  <div class="card">
    <h2>Step 1 — Create admin</h2>
    <p class="desc">This account can do anything in the panel. Add additional users from the Settings page later.</p>

    <div class="field-stack">
      <div class="field">
        <label class="field-label" for="user">Username <span class="field-required">*</span></label>
        <input id="user" class="input" type="text" value="robert" autocomplete="username">
      </div>

      <div class="field">
        <label class="field-label" for="dn">Display name <span class="field-optional">(optional)</span></label>
        <input id="dn" class="input" type="text" placeholder="e.g. Robert Soot" value="">
      </div>

      <div class="field">
        <label class="field-label" for="pw">Password <span class="field-required">*</span></label>
        <div class="input-group">
          <input id="pw" class="input" type="password" value="MyPassw0r" autocomplete="new-password">
          <button type="button" class="affix" aria-label="Show password">⊘</button>
        </div>
      </div>

      <div class="rules" aria-live="polite">
        <div class="rule is-met"><span class="mark">✓</span> At least 8 characters</div>
        <div class="rule is-met"><span class="mark">✓</span> Uppercase letter</div>
        <div class="rule is-met"><span class="mark">✓</span> Lowercase letter</div>
        <div class="rule is-met"><span class="mark">✓</span> Digit</div>
        <div class="rule"><span class="mark">○</span> Symbol  (! @ # $ % ^ &amp; * &hellip;)</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-ghost left">Cancel</button>
      <button class="btn btn-primary" disabled>Continue →</button>
    </div>
  </div>
</div>
</body>
</html>
