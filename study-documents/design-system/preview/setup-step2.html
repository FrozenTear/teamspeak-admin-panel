<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TS6 Manager — Setup Wizard (Step 2)</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="components.css">
<style>
  body { min-height: 100vh; display: grid; place-items: center; padding: var(--space-7); background: var(--bg-canvas); }
  .shell { width: 100%; max-width: 600px; display: grid; gap: var(--space-3); }
  .head { display: flex; align-items: center; gap: var(--space-4); justify-content: center; font: var(--weight-bold) var(--text-md) / 1 var(--font-sans); }
  .head .mark { width: 18px; height: 18px; background: var(--accent-fg); border-radius: var(--radius-full); box-shadow: 0 0 16px rgba(60, 190, 239, 0.7); }
  .head .meta { color: var(--text-secondary); font-weight: var(--weight-regular); font-size: var(--text-base); }
  .card h2 { margin: 0 0 var(--space-3); font: var(--weight-semibold) var(--text-xl) / var(--lh-xl) var(--font-sans); }
  .card .desc { margin: 0 0 var(--space-7); color: var(--text-secondary); font-size: var(--text-base); line-height: var(--lh-md); }
  .field-stack { display: grid; gap: var(--space-6); margin-bottom: var(--space-7); }
  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-5); }
  .test-row {
    display: flex; align-items: center; gap: var(--space-4);
    padding: var(--space-5); margin: var(--space-5) 0;
    background: rgba(46, 184, 114, 0.08); border: 1px solid rgba(46, 184, 114, 0.25);
    border-radius: var(--radius-md); color: var(--success-fg);
    font: var(--weight-medium) var(--text-sm) / var(--lh-sm) var(--font-sans);
  }
  details {
    margin: var(--space-5) 0;
    border-top: 1px dashed var(--border-subtle);
    padding-top: var(--space-5);
  }
  details > summary {
    list-style: none; cursor: pointer;
    color: var(--text-secondary);
    font: var(--weight-medium) var(--text-sm) / var(--lh-sm) var(--font-sans);
    display: inline-flex; gap: var(--space-3); align-items: center;
  }
  details > summary::before { content: "▸"; transition: transform var(--motion-fast); }
  details[open] > summary::before { transform: rotate(90deg); }
  .actions { display: flex; justify-content: flex-end; gap: var(--space-4); padding-top: var(--space-5); border-top: 1px solid var(--border-subtle); }
  .actions .left { margin-right: auto; }
  @media (max-width: 480px) {
    body { padding: var(--space-4); }
    .grid-2 { grid-template-columns: 1fr; }
    .actions { flex-direction: column-reverse; align-items: stretch; }
    .actions .btn { width: 100%; }
    .actions .left { margin: 0; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="head">
    <span class="mark"></span> TS6 Manager
    <span class="meta">— first-time setup</span>
  </div>

  <div class="steps">
    <span class="step is-done"><span class="dot">✓</span> Admin</span>
    <span class="connector"></span>
    <span class="step is-active"><span class="dot">2</span> Server</span>
    <span class="connector"></span>
    <span class="step"><span class="dot">3</span> Done</span>
  </div>

  <div class="card">
    <h2>Step 2 — Connect a TeamSpeak server <span class="field-optional" style="font-size:14px">(optional)</span></h2>
    <p class="desc">Skip and add servers later from the dashboard.</p>

    <div class="field-stack">
      <div class="field">
        <label class="field-label" for="dn">Display name <span class="field-required">*</span></label>
        <input id="dn" class="input" type="text" value="My Community">
      </div>

      <div class="grid-2">
        <div class="field">
          <label class="field-label" for="host">Host <span class="field-required">*</span></label>
          <input id="host" class="input" type="text" value="ts.example.com">
        </div>
        <div class="field">
          <label class="field-label" for="port">WebQuery port <span class="field-required">*</span></label>
          <input id="port" class="input" type="text" value="10080" inputmode="numeric">
          <span class="field-help">TS6 default</span>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="key">WebQuery API key <span class="field-required">*</span></label>
        <div class="input-group">
          <input id="key" class="input" type="password" value="•••••••••••••••••••••••••••••••" autocomplete="off">
          <button type="button" class="affix" aria-label="Show key">⊘</button>
        </div>
        <span class="field-help">Find this in the TS6 server admin → API Keys.</span>
      </div>

      <div class="test-row">
        <span style="font-size:18px;line-height:1">✓</span>
        Connected to <strong>My Community</strong>.
      </div>

      <details>
        <summary>Advanced — SSH event subscription (optional)</summary>
        <div class="field-stack" style="margin-top: var(--space-5)">
          <div class="grid-2">
            <div class="field">
              <label class="field-label" for="sshhost">SSH host</label>
              <input id="sshhost" class="input" type="text" placeholder="same as WebQuery host">
            </div>
            <div class="field">
              <label class="field-label" for="sshport">SSH port</label>
              <input id="sshport" class="input" type="text" value="10022" inputmode="numeric">
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label class="field-label" for="sshu">SSH user</label>
              <input id="sshu" class="input" type="text" value="serveradmin">
            </div>
            <div class="field">
              <label class="field-label" for="sshp">SSH password</label>
              <input id="sshp" class="input" type="password" value="">
            </div>
          </div>
        </div>
      </details>
    </div>

    <div class="actions">
      <button class="btn btn-ghost left">← Back</button>
      <button class="btn btn-secondary">Skip this step</button>
      <button class="btn btn-primary">Add server →</button>
    </div>
  </div>
</div>
</body>
</html>
