# Minimal dev compose for the Dioxus fullstack server.
# Production deployments use Quadlet units / `podman kube play` (added in a later OPS ticket).

services:
  fullstack:
    container_name: ts6-manager-fullstack
    image: localhost/ts6-manager-fullstack:dev
    build:
      context: .
      dockerfile: Containerfile.fullstack
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env or your shell before podman-compose up}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DATABASE_URL: surrealkv:///var/lib/ts6-manager/db
      MUSIC_DIR: /var/lib/ts6-manager/music
    # Named volumes, not host bind-mounts: under rootless podman the in-container
    # uid 10001 maps to a shifted host subuid that doesn't own ./data/*, so
    # SurrealKV can't open the store. Named volumes let podman own the chown.
    volumes:
      - ts6-db:/var/lib/ts6-manager/db:Z
      - ts6-music:/var/lib/ts6-manager/music:Z
    restart: unless-stopped

  # PURA-78 SSHBridge integration target — opt-in profile so it does
  # not run on every dev compose-up. Bring it up explicitly with
  #
  #   podman-compose --profile ssh-integration up -d ssh-integration
  #
  # Then point the env-gated test at it:
  #
  #   TS6_SSH_INTEGRATION=1 \
  #   TS6_SSH_HOST=127.0.0.1 \
  #   TS6_SSH_PORT=10022 \
  #   TS6_SSH_USER=serveradmin \
  #   TS6_SSH_PASSWORD=$(podman logs ts6-ssh-integration | grep token1=) \
  #   cargo test -p ts6-manager-server --features server -- \
  #     sshbridge::control_client::tests::integration --ignored --nocapture
  #
  # The TS3 server image speaks the same line protocol the spec
  # mandates for TS6 SSH ServerQuery (Chapter 11 §11.4) — that is the
  # whole rationale for SSHBridge as a parallel control path. We pin
  # to a versioned tag so the test target stays stable across image
  # updates.
  ssh-integration:
    container_name: ts6-ssh-integration
    image: docker.io/teamspeak/teamspeak3-server:3.13.7
    profiles:
      - ssh-integration
    environment:
      TS3SERVER_LICENSE: accept
    ports:
      - "10022:10022"
    restart: "no"

volumes:
  ts6-db:
  ts6-music:
