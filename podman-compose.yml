# Minimal dev compose for the Dioxus fullstack server.
# Production deployments use Quadlet units / `podman kube play` (added in a later OPS ticket).

services:
  fullstack:
    container_name: ts6-manager-fullstack
    image: localhost/ts6-manager-fullstack:dev
    build:
      context: .
      dockerfile: Containerfile.fullstack
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env or your shell before podman-compose up}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DATABASE_URL: surrealkv:///var/lib/ts6-manager/db
      MUSIC_DIR: /var/lib/ts6-manager/music
      # Operator-upload dir (yt-dlp cookie file, PURA-314). Pinned onto
      # the ts6-data volume below so it is not lost on container recreate.
      DATA_DIR: /var/lib/ts6-manager/data
    # Named volumes, not host bind-mounts: under rootless podman the in-container
    # uid 10001 maps to a shifted host subuid that doesn't own ./data/*, so
    # SurrealKV can't open the store. Named volumes let podman own the chown.
    # ts6-data backs the state root so DATA_DIR uploads survive a recreate;
    # ts6-db / ts6-music nest on top.
    volumes:
      - ts6-data:/var/lib/ts6-manager:Z
      - ts6-db:/var/lib/ts6-manager/db:Z
      - ts6-music:/var/lib/ts6-manager/music:Z
    restart: unless-stopped

  # PURA-78 SSHBridge integration target — opt-in profile so it does
  # not run on every dev compose-up. Bring it up explicitly with
  #
  #   podman-compose --profile ssh-integration up -d ssh-integration
  #
  # Then point the env-gated test at it:
  #
  #   TS6_SSH_INTEGRATION=1 \
  #   TS6_SSH_HOST=127.0.0.1 \
  #   TS6_SSH_PORT=10022 \
  #   TS6_SSH_USER=serveradmin \
  #   TS6_SSH_PASSWORD=$(podman logs ts6-ssh-integration | grep token1=) \
  #   cargo test -p ts6-manager-server --features server -- \
  #     sshbridge::control_client::tests::integration --ignored --nocapture
  #
  # The TS3 server image speaks the same line protocol the spec
  # mandates for TS6 SSH ServerQuery (Chapter 11 §11.4) — that is the
  # whole rationale for SSHBridge as a parallel control path. We pin
  # to a versioned tag so the test target stays stable across image
  # updates.
  ssh-integration:
    container_name: ts6-ssh-integration
    image: docker.io/teamspeak/teamspeak3-server:3.13.7
    profiles:
      - ssh-integration
    environment:
      TS3SERVER_LICENSE: accept
    ports:
      - "10022:10022"
    restart: "no"

  # Upstream TS6 server fixture — opt-in profile for QA bring-up. Brings up
  # the manager's target server locally so verifications 4 & 7 can run
  # against a real TS6 instance:
  #
  #   podman-compose --profile ts6-fixture up -d ts6-fixture
  #
  # `network_mode: host` is mandatory: under rootless podman's default
  # passt port-forward, the upstream WebQuery HTTP interface wedges after
  # exactly 5 requests (TCP accept then immediate close) until the
  # container is restarted. Host networking removes passt from the path
  # and the fixture handles sustained traffic. Full operator notes,
  # repro, and root-cause investigation status live in
  # `docs/ts6-fixture.md` (PURA-105).
  ts6-fixture:
    container_name: ts6-fixture
    image: docker.io/teamspeaksystems/teamspeak6-server:latest
    profiles:
      - ts6-fixture
      - voice-translator
    network_mode: host
    environment:
      TSSERVER_LICENSE_ACCEPTED: accept
      TSSERVER_QUERY_ADMIN_PASSWORD: ${TS6_FIXTURE_ADMIN_PASSWORD:-qa-admin}
      TSSERVER_QUERY_SKIP_BRUTE_FORCE_CHECK: "1"
      # PURA-177: both query interfaces default to disabled in the upstream
      # image (`tsserver --help` → `query-http-enable [0]`,
      # `query-ssh-enable [0]`). Without these flags the manager only sees
      # the legacy telnet ServerQuery and the WebQuery integration test
      # never gets a 200 on :10080.
      TSSERVER_QUERY_HTTP_ENABLED: "1"
      TSSERVER_QUERY_SSH_ENABLED: "1"
    volumes:
      - ts6-fixture-data:/var/tsserver
    restart: "no"

  # PURA-108 WS-7 / PURA-114 — Phase 3.5 WebRTC bridge translator. Self-hosted
  # SFU per ADR-0006 Decision B. Operator brings the bridge up alongside the
  # TS6 fixture with:
  #
  #   podman-compose --profile voice-translator up -d
  #
  # The translator daemon (ts6-voice-translator crate, lands in a follow-up
  # WS-7 slice) joins the TS6 voice room as a synthetic tsclientlib client and
  # bridges Opus frames to LiveKit room participants, including browser tabs
  # speaking WebRTC. Until the daemon ships, this profile gives operators the
  # SFU + TURN surface to bring up and smoke-test independently. See
  # docs/voice-translator.md for env vars, port surface, and the JWT key
  # rotation playbook.
  livekit:
    container_name: ts6-livekit
    image: docker.io/livekit/livekit-server:v1.7
    profiles:
      - voice-translator
    command: ["--config", "/etc/livekit/livekit.yaml"]
    # API key + secret live in deploy/voice/livekit.yaml under `keys:`.
    # The committed file ships obviously-dev keys; production operators
    # override the file (or supply LIVEKIT_CONFIG_FILE pointing at their
    # own YAML) per docs/voice-translator.md.
    #
    # `network_mode: host` (matching ts6-fixture and coturn) is mandatory
    # for the dev profile: LiveKit's WebRTC ICE candidates advertise the
    # interface the SFU binds. Under rootless podman's bridge networking
    # the bound interface is the container's private IP, which the host
    # translator/browser can't reach, so the peer-connection handshake
    # times out (`wait_pc_connection timed out`). Host networking makes
    # the bound interface == the host's interface, which is reachable
    # from translator + browser.
    network_mode: host
    volumes:
      - ./deploy/voice/livekit.yaml:/etc/livekit/livekit.yaml:ro,Z
    restart: unless-stopped

  # coturn TURN/STUN relay. Required for symmetric-NAT browser participants.
  # Operators on public-IP boxes without restrictive firewalls can disable
  # this service and fall back to LiveKit's embedded ICE; see ADR-0006
  # Decision B (TURN) and docs/voice-translator.md.
  coturn:
    container_name: ts6-coturn
    image: docker.io/coturn/coturn:4.6
    profiles:
      - voice-translator
    network_mode: host
    command:
      - --no-cli
      - --no-tls
      - --no-dtls
      - --listening-port=3478
      - --realm=${COTURN_REALM:-voice.local}
      - --use-auth-secret
      - --static-auth-secret=${COTURN_AUTH_SECRET:-devturnsecretdevturnsecretdevturn}
      - --min-port=49152
      - --max-port=49252
      - --log-file=stdout
      # Production deployments add `--no-loopback-peers` and
      # `--no-multicast-peers` — they exist in upstream coturn but are
      # built out of the official `coturn/coturn` Docker image. The
      # operator-runbook section in docs/voice-translator.md covers the
      # equivalent guard via `denied-peer-ip` for hardened deployments.
    restart: unless-stopped

volumes:
  ts6-data:
  ts6-db:
  ts6-music:
  ts6-fixture-data:
